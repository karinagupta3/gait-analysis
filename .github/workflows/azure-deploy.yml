# Build the web image in Azure Container Registry and roll the Container App.
# Add repo secrets: AZURE_CREDENTIALS (service principal JSON), ACR_NAME, RG, APP.
name: Deploy web app to Azure Container Apps

on:
  push:
    branches: [ main ]
    paths: [ "src/**", "Dockerfile", "pyproject.toml" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build image in ACR
        run: az acr build -r ${{ secrets.ACR_NAME }} -t gait-web:${{ github.sha }} .
      - name: Roll Container App to the new image
        run: >
          az containerapp update -n ${{ secrets.APP }} -g ${{ secrets.RG }}
          --image ${{ secrets.ACR_NAME }}.azurecr.io/gait-web:${{ github.sha }}
